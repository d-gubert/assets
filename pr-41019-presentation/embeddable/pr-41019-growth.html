<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR #41019 — Grow, Split, Converge</title>
<style>
  :root {
    --bg: #faf8f9; --surface: #ffffff; --surface-2: #f4f1f3; --ink: #1b1720;
    --muted: #6b6472; --faint: #948c9b; --line: #e7e2e6; --rail: #d6cfd6;
    --accent: #e01e42; --accent-soft: #fbe4e9;
    --merged: #8250df; --merged-soft: #efe7fb;
    --open: #1f883d; --open-soft: #e3f2e8;
    --amber: #b8791a; --amber-soft: #f6ecd8;
    --draft: #7a8290;
    --shadow: 0 1px 2px rgba(27,23,32,.06), 0 8px 24px rgba(27,23,32,.05);
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131016; --surface: #1c1822; --surface-2: #24202c; --ink: #ece8ef;
      --muted: #a29aab; --faint: #7d7488; --line: #2c2733; --rail: #39323f;
      --accent: #ff5c78; --accent-soft: #3a1a24;
      --merged: #a371f7; --merged-soft: #2a2140;
      --open: #3fb950; --open-soft: #16281c;
      --amber: #d9a441; --amber-soft: #2f2717;
      --draft: #7d8590;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #faf8f9; --surface: #ffffff; --surface-2: #f4f1f3; --ink: #1b1720;
    --muted: #6b6472; --faint: #948c9b; --line: #e7e2e6; --rail: #d6cfd6;
    --accent: #e01e42; --accent-soft: #fbe4e9; --merged: #8250df; --merged-soft: #efe7fb;
    --open: #1f883d; --open-soft: #e3f2e8; --amber: #b8791a; --amber-soft: #f6ecd8;
    --draft: #7a8290; --shadow: 0 1px 2px rgba(27,23,32,.06), 0 8px 24px rgba(27,23,32,.05);
  }
  :root[data-theme="dark"] {
    --bg: #131016; --surface: #1c1822; --surface-2: #24202c; --ink: #ece8ef;
    --muted: #a29aab; --faint: #7d7488; --line: #2c2733; --rail: #39323f;
    --accent: #ff5c78; --accent-soft: #3a1a24; --merged: #a371f7; --merged-soft: #2a2140;
    --open: #3fb950; --open-soft: #16281c; --amber: #d9a441; --amber-soft: #2f2717;
    --draft: #7d8590; --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: clamp(28px, 5vw, 72px) clamp(18px, 4vw, 44px) 80px; }

  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }
  .eyebrow::before { content: ""; width: 26px; height: 2px; background: var(--accent); display: inline-block; }
  h1 { font-size: clamp(30px, 5.2vw, 52px); line-height: 1.04; letter-spacing: -.028em; font-weight: 800; margin: 0 0 18px; text-wrap: balance; }
  h1 .pr { color: var(--accent); }
  .lede { font-size: clamp(16px, 2vw, 19px); color: var(--muted); max-width: 64ch; margin: 0 0 6px; }
  .lede b { color: var(--ink); font-weight: 650; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 38px 0 8px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 18px 18px 16px; box-shadow: var(--shadow); }
  .stat .num { font-family: var(--mono); font-size: clamp(23px, 3.4vw, 32px); font-weight: 600; letter-spacing: -.02em; font-variant-numeric: tabular-nums; line-height: 1; display: flex; align-items: baseline; gap: 4px; }
  .stat .num .sub { font-size: 14px; color: var(--faint); font-weight: 500; }
  .stat .lbl { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-top: 9px; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 26px clamp(16px, 3vw, 30px) 22px; margin: 40px 0 12px; }
  .card > .c-title { font-family: var(--mono); font-size: 12px; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); margin: 0 0 6px; }
  .card > .c-sub { font-size: 14px; color: var(--faint); margin: 0 0 16px; max-width: 72ch; }
  .card > .c-sub code, .inline-code { font-family: var(--mono); font-size: .86em; background: var(--surface-2); padding: 1.5px 6px; border-radius: 5px; color: var(--ink); }
  .scroll { overflow-x: auto; }
  svg { display: block; width: 100%; height: auto; min-width: 680px; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
  .legend span { font-family: var(--mono); font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .swatch.round { border-radius: 50%; }

  /* origins strip */
  .origins { display: flex; align-items: center; gap: 16px; background: var(--surface-2); border: 1px dashed var(--rail); border-radius: 12px; padding: 14px 18px; margin: 32px 0 0; font-size: 14px; color: var(--muted); }
  .origins .badge { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); white-space: nowrap; }
  .origins b { color: var(--ink); font-weight: 650; }
  .origins .prn { font-family: var(--mono); color: var(--muted); font-weight: 600; }

  /* section heads */
  .section-head { margin: 56px 0 26px; }
  .section-head h2 { font-size: 22px; letter-spacing: -.02em; margin: 0 0 6px; font-weight: 750; }
  .section-head p { color: var(--muted); margin: 0; font-size: 15px; max-width: 72ch; }

  /* timeline */
  .tl { position: relative; padding-left: 46px; }
  .tl::before { content: ""; position: absolute; left: 15px; top: 8px; bottom: 8px; width: 2px; background: var(--rail); }
  .ev { position: relative; padding: 0 0 30px; }
  .ev:last-child { padding-bottom: 0; }
  .ev .node { position: absolute; left: -38px; top: 3px; width: 16px; height: 16px; border-radius: 50%; background: var(--surface); border: 2.5px solid var(--rail); z-index: 2; }
  .ev.k-open .node { border-color: var(--accent); background: var(--accent); }
  .ev.k-flag .node { border-color: var(--accent); }
  .ev.k-split .node { border-color: var(--merged); background: var(--merged); }
  .ev.k-review .node { border-color: var(--amber); background: var(--amber); }
  .ev.k-ready .node { border-color: var(--open); background: var(--open); }
  .ev.k-final .node { border-color: var(--merged); background: var(--merged); box-shadow: 0 0 0 5px var(--merged-soft); }
  .ev .when { font-family: var(--mono); font-size: 12px; letter-spacing: .03em; color: var(--faint); font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .tag { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .tag.t-open { color: var(--accent); background: var(--accent-soft); }
  .tag.t-split { color: var(--merged); background: var(--merged-soft); }
  .tag.t-slog { color: var(--muted); background: var(--surface-2); }
  .tag.t-review { color: var(--amber); background: var(--amber-soft); }
  .tag.t-ready { color: var(--open); background: var(--open-soft); }
  .ev h3 { font-size: 17px; margin: 0 0 5px; letter-spacing: -.01em; font-weight: 700; }
  .ev p { margin: 0; color: var(--muted); font-size: 14.5px; max-width: 66ch; }
  .ev p code, .ev p .inline-code { font-family: var(--mono); font-size: .86em; background: var(--surface-2); padding: 1.5px 6px; border-radius: 5px; color: var(--ink); }

  .stack { margin: 14px 0 4px; display: grid; gap: 12px; }
  .prep { display: grid; grid-template-columns: 84px 1fr auto; align-items: center; gap: 16px; background: var(--surface-2); border: 1px solid var(--line); border-left: 3px solid var(--merged); border-radius: 10px; padding: 13px 16px; }
  @media (max-width: 620px) { .prep { grid-template-columns: 1fr; gap: 6px; } .prep .prep-diff { justify-self: start; } }
  .prep .prnum { font-family: var(--mono); font-weight: 600; font-size: 14px; color: var(--merged); }
  .prep .prep-body strong { display: block; font-size: 14.5px; font-weight: 650; letter-spacing: -.01em; }
  .prep .prep-body span { font-size: 12.5px; color: var(--faint); font-family: var(--mono); }
  .prep .prep-diff { font-family: var(--mono); font-size: 12.5px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .prep .add { color: var(--open); } .prep .del { color: var(--accent); }

  /* rebase reconstruction */
  .phase { margin: 0 0 8px; }
  .phase-hd { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin: 22px 0 10px; }
  .phase-hd .pk { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .04em; padding: 3px 9px; border-radius: 6px; color: #fff; }
  .pk.pa { background: var(--amber); } .pk.pb { background: var(--accent); } .pk.pc { background: var(--merged); } .pk.pd { background: var(--open); }
  .phase-hd h4 { margin: 0; font-size: 15.5px; font-weight: 700; letter-spacing: -.01em; }
  .phase-hd .rng { font-family: var(--mono); font-size: 12px; color: var(--faint); }
  .fp { display: grid; grid-template-columns: 118px 78px 1fr; gap: 12px; align-items: baseline; padding: 6px 0; border-top: 1px solid var(--line); font-size: 13.5px; }
  @media (max-width: 620px) { .fp { grid-template-columns: 1fr; gap: 2px; padding: 9px 0; } }
  .fp .fp-t { font-family: var(--mono); font-size: 12px; color: var(--faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .fp a.fp-sha { font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--rail); white-space: nowrap; }
  .fp a.fp-sha:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .fp .fp-s { color: var(--ink); }
  .fp .fp-desc { color: var(--ink); }
  .fp .fp-sub { display: block; margin-top: 3px; font-family: var(--mono); font-size: 11.5px; color: var(--faint); }
  .fp .fp-sub code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; }
  .fp.reb { position: relative; }
  .fp .reb-badge { display: inline-block; margin-left: 8px; font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--merged); background: var(--merged-soft); padding: 1px 7px; border-radius: 20px; vertical-align: middle; }

  .callout { margin: 20px 0 4px; background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); border-radius: 10px; padding: 14px 16px; font-size: 14px; color: var(--ink); }
  .callout.mrg { background: var(--merged-soft); border-color: color-mix(in srgb, var(--merged) 26%, transparent); }
  .callout b { color: var(--accent); } .callout.mrg b { color: var(--merged); }
  .callout code { font-family: var(--mono); font-size: .86em; background: color-mix(in srgb, var(--ink) 8%, transparent); padding: 1.5px 6px; border-radius: 5px; }

  /* branch-size bars */
  .bsize { display: flex; flex-direction: column; gap: 16px; }
  .brow .bhead { display: flex; justify-content: space-between; gap: 12px; font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 5px; flex-wrap: wrap; }
  .brow .bhead .bsha { color: var(--faint); }
  .brow .bhead .bnote { color: var(--faint); text-align: right; }
  .btrack { background: var(--surface-2); border: 1px solid var(--line); border-radius: 6px; height: 28px; overflow: hidden; }
  .bbar { height: 100%; border-radius: 5px; display: flex; align-items: center; padding: 0 11px; color: #fff; font-family: var(--mono); font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 34px; }
  .bbar.peak { background: var(--accent); }
  .bbar.mid { background: color-mix(in srgb, var(--accent) 68%, var(--surface)); }
  .bbar.amb { background: var(--amber); }
  .bbar.low { background: var(--open); }
  .bdiff { margin-top: 7px; font-family: var(--mono); font-size: 12px; color: var(--faint); font-variant-numeric: tabular-nums; display: flex; flex-wrap: wrap; gap: 4px 10px; align-items: baseline; }
  .bdiff .add { color: var(--open); font-weight: 600; }
  .bdiff .del { color: var(--accent); font-weight: 600; }
  .bdiff .fls { color: var(--muted); }

  /* clickable peak-monolith card + file tree */
  .mono-block { margin-top: 14px; }
  summary.prep-toggle { cursor: pointer; list-style: none; }
  summary.prep-toggle::-webkit-details-marker { display: none; }
  summary.prep-toggle:hover { border-color: var(--merged); background: color-mix(in srgb, var(--merged) 7%, var(--surface-2)); }
  summary.prep-toggle .chev { display: inline-block; transition: transform .18s ease; color: var(--merged); }
  details[open] > summary.prep-toggle .chev { transform: rotate(90deg); }
  .prep-toggle .prep-hint { font-size: 11px; color: var(--faint); font-family: var(--mono); }
  details[open] > .prep-toggle .prep-hint .say-open { display: none; }
  .prep-toggle .prep-hint .say-close { display: none; }
  details[open] > .prep-toggle .prep-hint .say-close { display: inline; }

  .filetree { margin: 12px 0 2px; padding: 14px 16px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; font-family: var(--mono); font-size: 12.5px; overflow-x: auto; }
  .tnode { margin: 1px 0; }
  .tnode > summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 7px; padding: 3px 5px; border-radius: 5px; color: var(--ink); white-space: nowrap; }
  .tnode > summary::-webkit-details-marker { display: none; }
  .tnode > summary:hover { background: color-mix(in srgb, var(--merged) 11%, transparent); }
  .tnode > summary .tdisc { display: inline-block; width: 9px; color: var(--muted); transition: transform .15s ease; }
  .tnode[open] > summary .tdisc { transform: rotate(90deg); }
  .tchildren { margin-left: 13px; border-left: 1px solid var(--line); padding-left: 10px; }
  .tname { font-weight: 600; }
  .tmeta { color: var(--faint); font-weight: 400; }
  .tfile { display: flex; align-items: center; gap: 8px; padding: 3px 5px 3px 20px; color: var(--muted); white-space: nowrap; }
  .tfile .tfname { font-weight: 500; color: var(--ink); }
  .tstat { margin-left: auto; padding-left: 16px; font-variant-numeric: tabular-nums; }
  .tadd { color: var(--open); } .tdel { color: var(--accent); }
  .tbadge { font-size: 9px; text-transform: uppercase; letter-spacing: .04em; padding: 1px 6px; border-radius: 10px; font-weight: 700; flex: none; }
  .b-added { color: var(--open); background: var(--open-soft); }
  .b-removed { color: var(--accent); background: var(--accent-soft); }
  .b-modified { color: var(--amber); background: var(--amber-soft); }
  .b-renamed { color: var(--merged); background: var(--merged-soft); }

  /* carousel: branch stack per force-push */
  .carousel-wrap { position: relative; }
  .carousel { display: flex; gap: 14px; overflow-x: auto; scroll-snap-type: x proximity; scroll-behavior: smooth; padding: 4px 2px 16px; }
  .carousel::-webkit-scrollbar { height: 9px; }
  .carousel::-webkit-scrollbar-thumb { background: var(--rail); border-radius: 20px; }
  .carousel::-webkit-scrollbar-track { background: transparent; }
  .cslide { flex: 0 0 clamp(240px, 78vw, 292px); scroll-snap-align: start; background: var(--surface-2); border: 1px solid var(--line); border-top: 3px solid var(--rail); border-radius: 12px; padding: 14px 14px 8px; display: flex; flex-direction: column; max-height: 460px; }
  .cslide.cs-a { border-top-color: var(--amber); }
  .cslide.cs-b { border-top-color: var(--accent); }
  .cslide.cs-c { border-top-color: var(--merged); }
  .cslide.cs-d { border-top-color: var(--open); }
  .cslide-hd { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .cnum { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--ink); }
  .cnum .cslash { color: var(--faint); font-weight: 400; }
  .cdate { font-family: var(--mono); font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
  .cslide-sub { display: flex; align-items: center; gap: 8px; margin: 9px 0 10px; }
  .cpill { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .03em; padding: 2px 8px; border-radius: 6px; color: #fff; }
  .cpill.pa { background: var(--amber); } .cpill.pb { background: var(--accent); } .cpill.pc { background: var(--merged); } .cpill.pd { background: var(--open); }
  .ccount { font-family: var(--mono); font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .cstack { list-style: none; margin: 0; padding: 0 2px 2px 0; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
  .cstack::-webkit-scrollbar { width: 7px; }
  .cstack::-webkit-scrollbar-thumb { background: var(--rail); border-radius: 20px; }
  .crow { display: flex; align-items: flex-start; gap: 8px; padding: 4px 6px; border-radius: 6px; }
  .crow:hover { background: color-mix(in srgb, var(--merged) 9%, transparent); }
  .crow.istip { background: color-mix(in srgb, var(--merged) 8%, transparent); }
  .crow a.csha { flex: none; font-family: var(--mono); font-size: 11px; color: var(--merged); text-decoration: none; border-bottom: 1px dotted var(--rail); padding-top: 1px; }
  .crow a.csha:hover { border-bottom-color: var(--merged); }
  .cmsg { flex: 1; min-width: 0; font-family: var(--mono); font-size: 11.5px; color: var(--ink); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ctip { flex: none; font-family: var(--mono); font-size: 8.5px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; color: var(--merged); background: var(--merged-soft); padding: 1px 5px; border-radius: 10px; margin-top: 1px; }
  .cbtn { position: absolute; top: -42px; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line); background: var(--surface); color: var(--ink); font-size: 17px; line-height: 1; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; }
  .cbtn:hover { border-color: var(--merged); color: var(--merged); }
  .cnext { right: 0; } .cprev { right: 40px; }
  .chint { font-family: var(--mono); font-size: 11px; color: var(--faint); margin: 0 0 10px; }
  .cpill.pprep { background: var(--merged); }

  /* prep-PR sub-carousels */
  .prep-sub { margin-bottom: 28px; }
  .prep-sub:last-child { margin-bottom: 0; }
  .prep-sub-hd { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin: 0 0 12px; padding-left: 2px; }
  .prep-sub-hd .prnum { font-family: var(--mono); font-weight: 700; color: var(--merged); font-size: 14px; }
  .prep-sub-hd strong { font-size: 14.5px; letter-spacing: -.01em; }
  .prep-sub-hd .meta { font-family: var(--mono); font-size: 11.5px; color: var(--faint); }
  .cbtns { margin-left: auto; display: flex; gap: 8px; }
  .cbtns .cbtn { position: static; box-shadow: none; }

  /* animation — grow / split / converge */
  :root { --fam-103: #2563eb; --fam-149: #0d9488; }
  @media (prefers-color-scheme: dark) { :root { --fam-103: #60a5fa; --fam-149: #2dd4bf; } }
  :root[data-theme="light"] { --fam-103: #2563eb; --fam-149: #0d9488; }
  :root[data-theme="dark"] { --fam-103: #60a5fa; --fam-149: #2dd4bf; }
  .anim-controls { display: flex; align-items: center; gap: 14px; margin: 0 0 12px; flex-wrap: wrap; }
  #anim-play { font-family: var(--mono); font-size: 13px; font-weight: 600; min-width: 92px; min-height: 38px; padding: 7px 16px; border-radius: 8px; border: 1px solid var(--merged); background: var(--merged); color: #fff; cursor: pointer; white-space: nowrap; }
  #anim-play:hover { filter: brightness(1.07); }
  .anim-step { font-family: var(--mono); font-size: 16px; line-height: 1; font-weight: 600; width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .anim-step:hover { border-color: var(--merged); color: var(--merged); }
  .anim-step:disabled { opacity: .4; cursor: default; }
  .anim-step:disabled:hover { border-color: var(--line); color: var(--ink); }
  #anim-scrub { flex: 1; min-width: 160px; accent-color: var(--merged); cursor: pointer; }
  #anim-clock { font-family: var(--mono); font-size: 13px; color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .anim-caption { font-family: var(--mono); font-size: 12.5px; color: var(--muted); min-height: 1.5em; margin: 0 0 12px; }
  .anim-caption b { color: var(--ink); }

      }
      var rest = PRS.filter(function(pr){ return vis[pr] && !seen[pr]; });
      rest.sort(function(a,b){ return (depth[b]-depth[a]) || (a>b?-1:1); });
      return order.concat(rest);
    }

    function go(idx, animate){
      idx = Math.max(0, Math.min(ev.length-1, idx));
      var st = stateAt(idx);
      // de-dup: once a prep PR carries a commit, it belongs to that column only —
      // it sheds out of #41019 (animated) instead of showing in both.
      var claimed = {};
      ["41103","41125","41149"].forEach(function(pr){
        st[pr].stack.forEach(function(c){ claimed[c[2]] = true; });
      });
      var e = ev[idx];
      var disp = {}, vis = {}, baseCode = {};
      PRS.forEach(function(pr){
        disp[pr] = pr === "41019" ? st[pr].stack.filter(function(c){ return !claimed[c[2]]; }) : st[pr].stack;
        vis[pr] = disp[pr].length > 0;                   // hide any PR column with 0 commits
        baseCode[pr] = baseAt(pr, e.t);
      });
      var order = computeOrder(vis, baseCode);
      // FLIP: record positions before the reorder so we can animate the column moves
      var first = {};
      if (animate) PRS.forEach(function(pr){ var el = L[pr].root; if (el.style.display !== "none") first[pr] = el.getBoundingClientRect(); });
      PRS.forEach(function(pr){ renderLane(pr, st[pr], disp[pr], animate, baseCode[pr],e); });
      PRS.forEach(function(pr){ L[pr].root.style.display = vis[pr] ? "" : "none"; });
      order.forEach(function(pr){ stage.appendChild(L[pr].root); });  // reorder: base-to-the-right
      if (animate) PRS.forEach(function(pr){
        var el = L[pr].root;
        if (!vis[pr]) return;
        var f = first[pr];
        if (!f){                                          // newly visible → scale/fade in
          el.style.transition = "none"; el.style.transform = "scale(.92)"; el.style.opacity = "0";
          el.getBoundingClientRect();
          el.style.transition = ""; el.style.transform = ""; el.style.opacity = "";
        } else {
          var last = el.getBoundingClientRect(), dx = f.left - last.left, dy = f.top - last.top;
          if (dx || dy){                                  // invert then play the slide
            el.style.transition = "none"; el.style.transform = "translate(" + dx + "px," + dy + "px)";
            el.getBoundingClientRect();
            el.style.transition = ""; el.style.transform = "";
          }
        }
      });
      clock.textContent = fmt(e.t);
      var commitCount=disp[e.pr].length;
      cap.innerHTML = e.type==="merge"
        ? '<b>#'+e.pr+' merged</b> into develop ✓' + (e.pr==="41019" ? ' — <b>Phase D complete.</b> All four PRs landed.' : '')
        : '<b>#'+e.pr+'</b> force-pushed → '+commitCount+' commit'+(commitCount!==1?'s':'') + (e.pr==="41019" && commitCount>=21 ? ' — the monolith at its fullest' : '');
      scrub.value = idx; cur = idx;
      if (typeof syncStep === "function") syncStep();
    }
    function stop(){ if (timer){ clearInterval(timer); timer = null; } play.textContent = cur>=ev.length-1 ? "↻ Replay" : "▶ Play"; }
    function start(){
      if (cur >= ev.length-1) go(0, false);
      play.textContent = "⏸ Pause";
      timer = setInterval(function(){
        if (cur >= ev.length-1){ stop(); return; }
        go(cur+1, true);
      }, 1100);
    }
    var prevBtn = document.getElementById("anim-prev"), nextBtn = document.getElementById("anim-next");
    function syncStep(){ prevBtn.disabled = cur <= 0; nextBtn.disabled = cur >= ev.length-1; }
    function step(delta){ stop(); go(cur + delta, true); play.textContent = cur>=ev.length-1 ? "↻ Replay" : "▶ Play"; }
    prevBtn.addEventListener("click", function(){ step(-1); });
    nextBtn.addEventListener("click", function(){ step(1); });
    play.addEventListener("click", function(){ timer ? stop() : start(); });
    scrub.addEventListener("input", function(){ stop(); go(parseInt(scrub.value,10), false); play.textContent = cur>=ev.length-1 ? "↻ Replay" : "▶ Play"; });
    go(0, false);
  })();
</script>
</body>
</html>
